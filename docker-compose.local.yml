# Local deployment — used behind nginx reverse proxy with SSL.
# The frontend uses relative URLs so nginx proxies /api/ to the backend.
#
# For direct access without proxy, override at build time:
#   NEXT_PUBLIC_API_URL=http://myhost:8000 docker compose -f docker-compose.local.yml up -d --build

services:
  api:
    build: .
    container_name: bokfoering-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite:////app/data/bokfoering.db"
      BOKFOERING_API_KEY: "dev-key-change-in-production"
    volumes:
      - bokfoering-data:/app/data

  frontend:
    build:
      context: ./frontend-v3
      args:
        # Empty = relative URLs (works behind nginx proxy with /api/ routing)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_API_KEY: "dev-key-change-in-production"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  bokfoering-data:
