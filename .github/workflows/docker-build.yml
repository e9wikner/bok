name: Docker Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: bokfoering-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Run docker-compose up
      run: |
        docker-compose up -d
        echo "Waiting for service to start..."
        sleep 10
    
    - name: Health check
      run: |
        curl -f http://localhost:8000/health || exit 1
        echo "✅ Health check passed"
    
    - name: Check API docs
      run: |
        curl -f http://localhost:8000/docs || exit 1
        echo "✅ API docs accessible"
    
    - name: Run pytest tests
      run: |
        docker-compose exec -T bokfoering-api python -m pytest tests/ -v || true
    
    - name: Stop containers
      if: always()
      run: docker-compose down -v
    
    - name: Build success
      if: success()
      run: echo "✅ Docker build and tests successful!"

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'bokfoering-api:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Check imports
      run: |
        python -m py_compile $(find . -name "*.py" -type f)
      continue-on-error: true
