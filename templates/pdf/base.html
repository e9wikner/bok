<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 20mm 15mm 25mm 15mm;
    @bottom-center {
      content: "Sida " counter(page) " av " counter(pages);
      font-size: 8pt;
      color: #888;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 10pt;
    color: #222;
    line-height: 1.4;
    margin: 0;
    padding: 0;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    border-bottom: 2px solid #2c5aa0;
    padding-bottom: 15px;
  }
  .header .logo-area {
    max-width: 200px;
  }
  .header .logo-area img {
    max-width: 180px;
    max-height: 60px;
  }
  .header .company-name {
    font-size: 18pt;
    font-weight: bold;
    color: #2c5aa0;
  }
  .header .doc-info {
    text-align: right;
  }
  .header .doc-title {
    font-size: 16pt;
    font-weight: bold;
    color: #2c5aa0;
    margin-bottom: 5px;
  }
  .meta-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
  }
  .meta-table td {
    padding: 3px 8px;
    vertical-align: top;
  }
  .meta-table .label {
    font-weight: bold;
    color: #555;
    width: 140px;
  }
  table.data-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
  }
  table.data-table thead th {
    background: #2c5aa0;
    color: white;
    padding: 8px 6px;
    text-align: left;
    font-size: 9pt;
    font-weight: 600;
  }
  table.data-table thead th.right { text-align: right; }
  table.data-table tbody td {
    padding: 6px;
    border-bottom: 1px solid #ddd;
  }
  table.data-table tbody td.right { text-align: right; }
  table.data-table tbody tr:nth-child(even) { background: #f8f9fa; }
  table.data-table tfoot td {
    padding: 8px 6px;
    font-weight: bold;
    border-top: 2px solid #2c5aa0;
  }
  table.data-table tfoot td.right { text-align: right; }
  .totals-box {
    width: 280px;
    float: right;
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .totals-box table {
    width: 100%;
    border-collapse: collapse;
  }
  .totals-box td {
    padding: 6px 10px;
    border-bottom: 1px solid #eee;
  }
  .totals-box .total-row {
    background: #2c5aa0;
    color: white;
    font-weight: bold;
  }
  .totals-box .total-row td {
    border-bottom: none;
    padding: 8px 10px;
  }
  .totals-box .label { text-align: left; }
  .totals-box .amount { text-align: right; }
  .payment-info {
    clear: both;
    background: #f0f4f8;
    border-radius: 4px;
    padding: 12px 15px;
    margin-bottom: 15px;
  }
  .payment-info h3 {
    margin: 0 0 8px 0;
    font-size: 11pt;
    color: #2c5aa0;
  }
  .payment-info p { margin: 3px 0; }
  .qr-code {
    text-align: center;
    margin: 15px 0;
  }
  .qr-code img {
    width: 120px;
    height: 120px;
  }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    border-top: 1px solid #ccc;
    padding-top: 8px;
    font-size: 7.5pt;
    color: #888;
    text-align: center;
    line-height: 1.5;
  }
  .section-title {
    font-size: 13pt;
    font-weight: bold;
    color: #2c5aa0;
    margin: 20px 0 10px 0;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
  }
  .report-period {
    font-size: 10pt;
    color: #666;
    margin-bottom: 15px;
  }
  .indent-1 td:first-child { padding-left: 20px; }
  .indent-2 td:first-child { padding-left: 40px; }
  .group-header td { font-weight: bold; background: #eef2f7; }
  .group-total td { font-weight: bold; border-top: 1px solid #999; }
  .grand-total td { font-weight: bold; border-top: 2px solid #2c5aa0; font-size: 11pt; }
  .clearfix::after { content: ""; clear: both; display: table; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
