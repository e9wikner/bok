services:
  bokfoering-api:
    build: .
    container_name: bokfoering-api
    ports:
      - "8000:8000"
    volumes:
      - bokfoering-data:/app/data
    environment:
      - DEBUG=False
      - BOKFOERING_API_KEY=${BOKFOERING_API_KEY:-dev-key-change-in-production}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
      - DATABASE_URL=sqlite:////app/data/bokfoering.db
    command: sh -c "python main.py --init-db && python main.py --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend-v3
    container_name: bokfoering-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_API_KEY=dev-key-change-in-production
      - BACKEND_URL=http://bokfoering-api:8000
    restart: unless-stopped
    depends_on:
      bokfoering-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bokfoering-data:
