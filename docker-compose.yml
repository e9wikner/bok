services:
  bokfoering-api:
    build: .
    container_name: bokfoering-api
    ports:
      - "8000:8000"
    volumes:
      - bokfoering-data:/app/data
    environment:
      - DEBUG=False
      - BOKFOERING_API_KEY=dev-key-change-in-production
      - DATABASE_URL=sqlite:////app/data/bokfoering.db
    command: sh -c "python main.py --init-db --seed && python main.py --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: .
    container_name: bokfoering-frontend
    ports:
      - "8501:8501"
    volumes:
      - bokfoering-data:/app/data
    environment:
      - API_URL=http://bokfoering-api:8000
      - API_KEY=dev-key-change-in-production
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
    depends_on:
      - bokfoering-api

volumes:
  bokfoering-data:
